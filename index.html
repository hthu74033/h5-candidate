<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>面试登记表 - 千广传媒</title>
    <!-- 预连接 CDN，减少 DNS+TCP 延迟 -->
    <link rel="preconnect" href="https://hthu74033.github.io" crossorigin />
    <!-- 骨架屏：防止白屏 -->
    <style>
      #app-loading {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #F4F7FE; z-index: 9999;
        transition: opacity 0.3s;
      }
      #app-loading .spinner {
        width: 36px; height: 36px;
        border: 3px solid #e0e7ff;
        border-top-color: #4f46e5;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #app-loading p {
        margin-top: 12px; color: #6b7280; font-size: 14px; font-family: sans-serif;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body class="bg-[#F4F7FE] antialiased">
    <!-- 骨架屏，Vue挂载后自动消失 -->
    <div id="app-loading">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Vue挂载完成后移除骨架屏
      document.addEventListener('DOMContentLoaded', function() {
        var check = setInterval(function() {
          var app = document.getElementById('app')
          if (app && app.children.length > 0) {
            var loading = document.getElementById('app-loading')
            if (loading) {
              loading.style.opacity = '0'
              setTimeout(function() { loading.remove() }, 300)
            }
            clearInterval(check)
          }
        }, 50)
      })
    </script>
  </body>
</html>
